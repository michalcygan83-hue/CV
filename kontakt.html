<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakt</title>
    <meta name="author" content="75555">
</head>
<body>

    <h1>Kontakt</h1>

    <form action="https://formspree.io/f/mjgpyzjz" method="POST">

        <!-- temat maila -->
        <input type="hidden" name="_subject" value="Nowa wiadomość z formularza CV UFO">

        <p>Imię:</p>
        <input type="text" id="imie" name="imie" required>

        <p>Nazwisko:</p>
        <input type="text" id="nazwisko" name="nazwisko" required>

        <p>Email:</p>
        <input type="email" id="email" name="email" required>

        <p>Telefon:</p>
        <input type="tel" id="telefon" name="telefon" required>

        <p>Treść zlecenia:</p>
        <textarea id="tresc" name="tresc" required></textarea>

        <p>Oferta finansowa (PLN):</p>
        <input type="number" id="oferta" name="oferta" required>

        <br><br>
        <button type="submit">Wyślij</button>

    </form>

    <p><a href="index.html">Powrót do CV</a></p>

</body>
</html>
